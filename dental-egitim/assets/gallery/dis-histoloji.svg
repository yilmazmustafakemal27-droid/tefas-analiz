<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 640" role="img" aria-label="Dis anatomik kesit diyagrami">
  <title>Dis anatomik kesit (histoloji semasi)</title>
  <defs>
    <linearGradient id="hEn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcff"/><stop offset="100%" stop-color="#e2e7ef"/>
    </linearGradient>
    <linearGradient id="hDn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3dca6"/><stop offset="100%" stop-color="#e0c37e"/>
    </linearGradient>
    <radialGradient id="hPulp" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ef7a89"/><stop offset="100%" stop-color="#d8455a"/>
    </radialGradient>
    <linearGradient id="hBone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3d6bb"/><stop offset="100%" stop-color="#c9b993"/>
    </linearGradient>
    <linearGradient id="hGum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eb99a0"/><stop offset="100%" stop-color="#d76f79"/>
    </linearGradient>
    <style>
      .lbl{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#eef1ee;}
      .reg{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-style:italic;fill:#9fb3c9;}
      .ln{stroke:#dfe3df;stroke-width:1;fill:none;opacity:.85;}
      .dot{fill:#dfe3df;}
      .tub{stroke:#cda85a;stroke-width:0.7;opacity:0.55;}
      .prism{stroke:#c9d2e0;stroke-width:0.6;opacity:0.6;}
    </style>
  </defs>
  <rect width="700" height="640" fill="#171b21"/>

  <!-- bone left & right -->
  <path d="M40 330 Q140 320 200 340 L200 600 L40 600 Z" fill="url(#hBone)"/>
  <path d="M660 330 Q560 320 500 340 L500 600 L660 600 Z" fill="url(#hBone)"/>

  <!-- gingiva -->
  <path d="M160 340 Q210 280 250 250 L250 300 Q235 330 210 350 Z" fill="url(#hGum)"/>
  <path d="M540 340 Q490 280 450 250 L450 300 Q465 330 490 350 Z" fill="url(#hGum)"/>

  <!-- dentin body (crown + single root) -->
  <path d="M230 120 Q350 60 470 120 L440 260 Q430 300 420 360 L410 560 Q350 610 290 560 L280 360 Q270 300 260 260 Z" fill="url(#hDn)"/>
  <!-- dentin tubule hint lines -->
  <g class="tub">
    <path d="M300 200 L262 260" fill="none"/>
    <path d="M330 190 L318 300" fill="none"/>
    <path d="M370 190 L382 300" fill="none"/>
    <path d="M400 200 L438 260" fill="none"/>
    <path d="M320 400 L300 520" fill="none"/>
    <path d="M380 400 L400 520" fill="none"/>
    <path d="M350 380 L350 540" fill="none"/>
  </g>

  <!-- enamel cap (crown) -->
  <path d="M232 118 Q350 58 468 118 L456 176 Q350 138 244 176 Z" fill="url(#hEn)"/>
  <!-- enamel prism hint -->
  <g class="prism">
    <path d="M270 120 L262 172"/><path d="M300 108 L296 168"/>
    <path d="M330 102 L330 164"/><path d="M370 102 L370 164"/>
    <path d="M400 108 L404 168"/><path d="M430 120 L438 172"/>
  </g>

  <!-- cementum thin layer on root surface -->
  <path d="M280 300 L290 560 Q300 574 300 560 L292 300 Z" fill="#e0cfa2"/>
  <path d="M420 300 L410 560 Q400 574 400 560 L408 300 Z" fill="#e0cfa2"/>

  <!-- periodontal ligament space -->
  <path d="M280 320 L290 560" stroke="#c98b91" stroke-width="5" fill="none" opacity="0.65"/>
  <path d="M420 320 L410 560" stroke="#c98b91" stroke-width="5" fill="none" opacity="0.65"/>

  <!-- pulp chamber + root canal -->
  <path d="M300 170 Q350 158 400 170 L392 250 Q380 290 372 340 L364 520 Q350 545 336 520 L328 340 Q320 290 308 250 Z" fill="url(#hPulp)"/>
  <!-- vessel/nerve bundle: red + blue lines through canal -->
  <path d="M350 200 L350 545" stroke="#b41f2e" stroke-width="2.5" fill="none"/>
  <path d="M344 210 Q340 380 348 545" stroke="#2f5fb0" stroke-width="2" fill="none"/>
  <path d="M356 210 Q360 380 352 545" stroke="#c23a48" stroke-width="1.5" fill="none"/>
  <!-- apical foramen opening -->
  <circle cx="350" cy="552" r="6" fill="#8a1520"/>

  <!-- neck / CEJ marker -->
  <line x1="248" y1="240" x2="452" y2="240" stroke="#9aa0a8" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- region brackets on right -->
  <g class="reg">
    <path d="M478 120 L490 120 L490 236 L478 236" fill="none" stroke="#5a6672"/>
    <text x="496" y="182">Kron</text>
    <path d="M478 240 L490 240 L490 300 L478 300" fill="none" stroke="#5a6672"/>
    <text x="496" y="270">Servikal</text>
    <path d="M478 304 L490 304 L490 566 L478 566" fill="none" stroke="#5a6672"/>
    <text x="496" y="440">Kok</text>
  </g>

  <!-- labels left -->
  <g>
    <line class="ln" x1="256" y1="150" x2="120" y2="120"/><circle class="dot" cx="256" cy="150" r="2.5"/>
    <text class="lbl" x="80" y="114">Mine</text>

    <line class="ln" x1="280" y1="210" x2="120" y2="200"/><circle class="dot" cx="280" cy="210" r="2.5"/>
    <text class="lbl" x="72" y="204">Dentin</text>

    <line class="ln" x1="336" y1="220" x2="120" y2="280"/><circle class="dot" cx="336" cy="220" r="2.5"/>
    <text class="lbl" x="80" y="284">Pulpa</text>

    <line class="ln" x1="350" y1="400" x2="120" y2="420"/><circle class="dot" cx="350" cy="400" r="2.5"/>
    <text class="lbl" x="60" y="424">Kok kanali</text>

    <line class="ln" x1="286" y1="440" x2="120" y2="480"/><circle class="dot" cx="286" cy="440" r="2.5"/>
    <text class="lbl" x="78" y="484">Sement</text>

    <line class="ln" x1="284" y1="500" x2="120" y2="540"/><circle class="dot" cx="284" cy="500" r="2.5"/>
    <text class="lbl" x="40" y="544">Periodontal ligament</text>

    <line class="ln" x1="150" y1="420" x2="60" y2="600"/><circle class="dot" cx="150" cy="420" r="2.5"/>
    <text class="lbl" x="30" y="616">Alveol kemigi</text>
  </g>

  <!-- labels right -->
  <g>
    <line class="ln" x1="210" y1="300" x2="250" y2="330"/><circle class="dot" cx="210" cy="300" r="2.5"/>
    <text class="lbl" x="180" y="352">Dis eti</text>

    <line class="ln" x1="350" y1="552" x2="470" y2="600"/><circle class="dot" cx="350" cy="552" r="2.5"/>
    <text class="lbl" x="476" y="604">Apikal foramen</text>
  </g>
</svg>
